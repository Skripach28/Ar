<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>AR Eiffel</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: Arial; }
    #start-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 24px 48px; font-size: 28px; z-index: 20; background: white; border: 3px solid black; border-radius: 8px; cursor: pointer; }
    #info { position: absolute; top: 20px; left: 20px; right: 20px; color: white; background: rgba(0,0,0,0.6); padding: 12px; border-radius: 6px; z-index: 10; font-size: 18px; text-align: center; }
  </style>
</head>
<body>
  <button id="start-btn">▶ СТАРТ AR</button>
  <div id="info">Нажмите кнопку для запуска</div>

  <script src="./js/three.min.js"></script>
  <script src="./js/aframe-ar.min.js"></script>

  <script>
    (function() {
      const startBtn = document.getElementById('start-btn');
      const info = document.getElementById('info');

      // Проверяем только A-Frame (без THREEx)
      if (typeof AFRAME === 'undefined') {
        info.innerText = '❌ Библиотека AR.js не загрузилась. Проверьте, что файл aframe-ar.min.js лежит в папке js и не повреждён.';
        return;
      }

      startBtn.addEventListener('click', async function() {
        startBtn.style.display = 'none';
        try {
          await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
          info.innerText = '✅ Камера получена. Запускаем AR...';
        } catch (e) {
          info.innerText = '❌ Нет доступа к камере.';
          startBtn.style.display = 'block';
          return;
        }

        const sceneEl = document.createElement('a-scene');
        sceneEl.setAttribute('embedded', '');
        sceneEl.setAttribute('arjs', 'sourceType: webcam; trackingMethod: best; debugUIEnabled: false;');

        const markerEl = document.createElement('a-marker');
        markerEl.setAttribute('preset', 'hiro');

        const boxEl = document.createElement('a-box');
        boxEl.setAttribute('position', '0 0.5 0');
        boxEl.setAttribute('material', 'color: cyan;');
        boxEl.setAttribute('scale', '0.5 0.5 0.5');

        markerEl.appendChild(boxEl);
        sceneEl.appendChild(markerEl);
        document.body.appendChild(sceneEl);

        info.innerText = '✅ AR запущен. Наведите на маркер Hiro.';
      });
    })();
  </script>
</body>
</html>
