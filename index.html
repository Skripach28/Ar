<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AR Eiffel</title>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image.prod.js"></script>
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.126.0/build/three.module.js" } }
  </script>
  <style>
    body { margin: 0; overflow: hidden; }
    #start-btn {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      padding: 20px 40px; font-size: 24px;
      z-index: 20; background: white; border: 2px solid black;
      cursor: pointer;
    }
    #info { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 5px; z-index: 10; }
  </style>
</head>
<body>
  <button id="start-btn">▶ СТАРТ AR</button>
  <div id="info"></div>

  <script type="module">
    import * as THREE from 'three';

    const startBtn = document.getElementById('start-btn');
    const info = document.getElementById('info');

    startBtn.addEventListener('click', () => {
      startBtn.style.display = 'none';

      const mindarThree = new window.MINDAR.IMAGE.MindARThree({
        container: document.body,
        imageTargetSrc: './targets.mind'
      });

      const { renderer, scene, camera } = mindarThree;

      const light = new THREE.HemisphereLight(0xffffff, 0x444444);
      scene.add(light);

      const geometry = new THREE.BoxGeometry(0.2, 0.2, 0.2);
      const material = new THREE.MeshStandardMaterial({ color: 0x00ffff });
      const cube = new THREE.Mesh(geometry, material);

      const anchor = mindarThree.addAnchor(0);
      anchor.group.add(cube);

      anchor.onTargetFound = () => info.innerText = '✅ Маркер найден';
      anchor.onTargetLost = () => info.innerText = 'Ищем маркер...';

      mindarThree.start();
    });
  </script>
</body>
</html>
