<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AR Eiffel</title>
  <!-- Загружаем MindAR как обычный скрипт -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image.prod.js"></script>
  <!-- Three.js тоже через CDN -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.126.0/build/three.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: Arial; }
    #start-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; font-size: 24px; z-index: 20; background: white; border: 2px solid black; cursor: pointer; }
    #info { position: absolute; top: 10px; left: 10px; color: white; background: rgba(0,0,0,0.5); padding: 5px; z-index: 10; }
    #debug { position: absolute; bottom: 10px; left: 10px; right: 10px; color: white; background: rgba(0,0,0,0.7); padding: 10px; z-index: 15; font-size: 14px; }
  </style>
</head>
<body>
  <button id="start-btn">▶ СТАРТ AR</button>
  <div id="info"></div>
  <div id="debug"></div>

  <script>
    const startBtn = document.getElementById('start-btn');
    const info = document.getElementById('info');
    const debug = document.getElementById('debug');

    function log(msg) {
      debug.innerText += msg + '\n';
      console.log(msg);
    }

    startBtn.addEventListener('click', async () => {
      startBtn.style.display = 'none';
      debug.innerText = '';

      // Проверяем, загрузился ли MindAR
      if (typeof MINDAR === 'undefined' || !MINDAR.IMAGE || !MINDAR.IMAGE.MindARThree) {
        log('❌ MindAR не загрузился. Проверьте интернет и CDN.');
        startBtn.style.display = 'block';
        return;
      }

      log('🟡 Запрос камеры...');
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        log('✅ Камера получена, останавливаем пробный поток.');
        stream.getTracks().forEach(track => track.stop());
      } catch (err) {
        log('❌ Ошибка доступа к камере: ' + err.message);
        startBtn.style.display = 'block';
        return;
      }

      log('🟡 Запуск MindAR...');
      try {
        const mindarThree = new MINDAR.IMAGE.MindARThree({
          container: document.body,
          imageTargetSrc: './targets.mind'
        });
        const { renderer, scene, camera } = mindarThree;
        scene.add(new THREE.HemisphereLight(0xffffff, 0x444444));
        const cube = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.2), new THREE.MeshStandardMaterial({ color: 0x00ffff }));
        const anchor = mindarThree.addAnchor(0);
        anchor.group.add(cube);
        anchor.onTargetFound = () => info.innerText = '✅ Маркер найден';
        anchor.onTargetLost = () => info.innerText = 'Ищем маркер...';
        await mindarThree.start();
        log('✅ MindAR запущен. Ищем маркер.');
      } catch (err) {
        log('❌ Ошибка MindAR: ' + err.message);
        startBtn.style.display = 'block';
      }
    });
  </script>
</body>
</html>
